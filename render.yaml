services:
  - type: web
    name: zen-benefits-navigator
    runtime: python
    rootDir: zen-3
    buildCommand: "pip install -r requirements.txt && python scraper.py --seed"
    startCommand: "uvicorn app:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
